<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C&M - Rotina Sequencial v3.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --cor-laranja: #F5A623;
            --cor-verde: #C8D946;
            --cor-turquesa: #4ECDC4;
            --cor-escuro: #2C5F5D;
        }
        
        .bg-cm-escuro { background-color: var(--cor-escuro); }
        .bg-cm-laranja { background-color: var(--cor-laranja); }
        .bg-cm-verde { background-color: var(--cor-verde); }
        .bg-cm-turquesa { background-color: var(--cor-turquesa); }
        .text-cm-escuro { color: var(--cor-escuro); }
        .text-cm-laranja { color: var(--cor-laranja); }
        
        .pulse-animation {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 50;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            overflow-y: auto;
        }
        
        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .modal-content {
            background: white;
            border-radius: 12px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        
        .timer-warning {
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 50%, 100% { opacity: 1; }
            25%, 75% { opacity: 0.5; }
        }
        
        .progress-bar {
            transition: width 0.5s ease;
        }
        
        .tarefa-card {
            min-height: 400px;
        }
        
        .regra-item {
            border-left: 4px solid var(--cor-turquesa);
        }
        
        .sidebar-regras {
            position: fixed;
            right: 0;
            top: 0;
            height: 100vh;
            width: 300px;
            background: white;
            box-shadow: -4px 0 6px rgba(0,0,0,0.1);
            padding: 20px;
            overflow-y: auto;
            z-index: 40;
        }
        
        @media (max-width: 768px) {
            .sidebar-regras {
                display: none;
            }
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--cor-laranja), var(--cor-turquesa));
            color: white;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 8px;
            transition: opacity 0.2s;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
        }
        
        .btn-secondary {
            background: #6B7280;
            color: white;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        
        .btn-secondary:hover {
            background: #4B5563;
        }
        
        .btn-danger {
            background: #EF4444;
            color: white;
            font-weight: bold;
            padding: 12px 24px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        
        .btn-danger:hover {
            background: #DC2626;
        }
    </style>
</head>
<body class="bg-gray-50">
    
    <!-- Modal "Não Deu Tempo" -->
    <div id="modalNaoDeuTempo" class="modal">
        <div class="modal-content">
            <div class="bg-cm-escuro text-white p-6 rounded-t-xl">
                <h2 class="text-xl font-bold">❌ Por que não deu tempo?</h2>
            </div>
            <div class="p-6">
                <div id="conteudoModalNaoDeuTempo"></div>
            </div>
        </div>
    </div>
    
    <!-- Modal de Pausa -->
    <div id="modalPausa" class="modal">
        <div class="modal-content">
            <div class="bg-cm-escuro text-white p-6 rounded-t-xl">
                <h2 class="text-xl font-bold">⏸️ Pausar Rotina</h2>
            </div>
            <div class="p-6">
                <p class="text-gray-700 mb-4">Deseja pausar a rotina? Você pode continuar de onde parou.</p>
                <div class="flex gap-3">
                    <button onclick="app.confirmarPausa()" class="flex-1 btn-danger">Pausar</button>
                    <button onclick="app.fecharModalPausa()" class="flex-1 btn-secondary">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app"></div>

    <script>
        const SUPABASE_URL = 'https://awppfluuudipkgrtrgyw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3cHBmbHV1dWRpcGtncnRyZ3l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk4MTk5MDYsImV4cCI6MjA4NTM5NTkwNn0.L7EjW4ytXMbVlGxhsMb8Hh77cjRpPr5Y-KG0dR4e35A';
        
        if (!window.__cmSupabaseClient) {
            window.__cmSupabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }
        var supabase = window.__cmSupabaseClient;

        class RotinaSequencial {
            constructor() {
                this.currentUser = null;
                this.isAdmin = false;
                this.currentPage = 'dashboard'; // dashboard, rotina, metricas, admin-geral, admin-consultor
                this.periodo = null; // 'manha' ou 'tarde'
                this.tarefas = [];
                this.tarefaAtualIndex = 0;
                this.regras = [];
                this.statusPlataformas = { whatsapp_ok: false, ll_ok: false, rotina_ok: true };
                this.metricas = {
                    total_tarefas: 0,
                    concluidas: 0,
                    nao_deu_tempo: 0,
                    leads_atendidos: 0
                };
                this.timerLeadNovo = null;
                this.ultimoLeadTimestamp = null;
                this.autoSaveInterval = null;
                this.metricasHistorico = [];
                this.rankingConsultores = [];
                this.consultorSelecionado = null;
                
                this.verificarSessao();
            }

            async verificarSessao() {
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    this.currentUser = session.user;
                    await this.carregarDados();
                    this.iniciarAutoSave();
                    this.renderDashboard();
                } else {
                    this.renderLogin();
                }
            }

            async carregarDados() {
                // Carregar regras
                const { data: regras } = await supabase
                    .from('regras_lembretes')
                    .select('*')
                    .eq('sempre_visivel', true)
                    .order('ordem');
                this.regras = regras || [];

                // Carregar status plataformas
                const hoje = new Date().toISOString().split('T')[0];
                const { data: status } = await supabase
                    .from('status_plataformas')
                    .select('*')
                    .eq('user_id', this.currentUser.id)
                    .eq('data', hoje)
                    .single();
                
                if (status) {
                    this.statusPlataformas = status;
                }

                // Carregar métricas históricas (últimos 7 dias)
                await this.carregarMetricasHistorico();

                // Se for admin, carregar ranking
                if (this.isAdmin) {
                    await this.carregarRankingConsultores();
                }
            }

            async carregarMetricasHistorico() {
                const { data, error } = await supabase
                    .from('vw_metricas_diarias')
                    .select('*')
                    .eq('user_id', this.currentUser.id)
                    .gte('data', new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0])
                    .order('data', { ascending: false });

                if (!error && data) {
                    this.metricasHistorico = data;
                }
            }

            async carregarRankingConsultores() {
                const { data, error } = await supabase
                    .from('vw_ranking_consultores')
                    .select('*');

                if (!error && data) {
                    this.rankingConsultores = data;
                }
            }

            async iniciarRotina(periodo) {
                this.periodo = periodo;
                
                // Carregar templates de tarefas
                const { data: templates } = await supabase
                    .from('rotina_templates')
                    .select('*')
                    .eq('periodo', periodo)
                    .order('ordem');
                
                if (!templates || templates.length === 0) {
                    alert('❌ Nenhuma tarefa encontrada para este período!');
                    return;
                }

                // Verificar se já existe progresso salvo
                const hoje = new Date().toISOString().split('T')[0];
                const { data: progressoSalvo } = await supabase
                    .from('progresso_diario')
                    .select('*')
                    .eq('user_id', this.currentUser.id)
                    .eq('data', hoje)
                    .eq('periodo', periodo)
                    .single();

                if (progressoSalvo && progressoSalvo.status === 'em_andamento') {
                    // Continuar de onde parou
                    this.tarefas = progressoSalvo.progresso.tarefas;
                    this.tarefaAtualIndex = progressoSalvo.tarefa_atual_index;
                    this.metricas = progressoSalvo.metricas;
                } else {
                    // Iniciar nova rotina
                    this.tarefas = templates.map((t, index) => ({
                        ...t,
                        index: index,
                        status: 'pendente', // pendente, concluida, nao_deu_tempo
                        motivo_nao_concluida: null,
                        horario_conclusao: null,
                        contador_valor: 0
                    }));
                    this.tarefaAtualIndex = 0;
                    this.metricas = {
                        total_tarefas: this.tarefas.length,
                        concluidas: 0,
                        nao_deu_tempo: 0,
                        leads_atendidos: 0
                    };

                    // Salvar início
                    await supabase.from('progresso_diario').insert({
                        user_id: this.currentUser.id,
                        data: hoje,
                        periodo: periodo,
                        tarefa_atual_index: 0,
                        progresso: { tarefas: this.tarefas },
                        metricas: this.metricas,
                        status: 'em_andamento',
                        iniciado_em: new Date().toISOString()
                    });
                }

                this.renderTarefaAtual();
            }

            async concluirTarefa() {
                const tarefa = this.tarefas[this.tarefaAtualIndex];
                tarefa.status = 'concluida';
                tarefa.horario_conclusao = new Date().toISOString();
                
                this.metricas.concluidas++;
                
                await this.salvarProgresso();
                await this.proximaTarefa();
            }

            abrirModalNaoDeuTempo() {
                this.renderModalNaoDeuTempo();
                document.getElementById('modalNaoDeuTempo').classList.add('active');
            }

            fecharModalNaoDeuTempo() {
                document.getElementById('modalNaoDeuTempo').classList.remove('active');
            }

            renderModalNaoDeuTempo() {
                const conteudo = document.getElementById('conteudoModalNaoDeuTempo');
                conteudo.innerHTML = `
                    <div class="space-y-4">
                        <p class="text-gray-700 font-semibold">Selecione o motivo:</p>
                        
                        <div class="space-y-2">
                            <label class="flex items-center gap-3 p-3 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                                <input type="radio" name="motivo" value="Muitos atendimentos" class="w-5 h-5">
                                <span>😰 Muitos atendimentos</span>
                            </label>
                            <label class="flex items-center gap-3 p-3 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                                <input type="radio" name="motivo" value="Problema técnico" class="w-5 h-5">
                                <span>🔧 Problema técnico</span>
                            </label>
                            <label class="flex items-center gap-3 p-3 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                                <input type="radio" name="motivo" value="Reunião não prevista" class="w-5 h-5">
                                <span>📅 Reunião não prevista</span>
                            </label>
                            <label class="flex items-center gap-3 p-3 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                                <input type="radio" name="motivo" value="Falta de tempo" class="w-5 h-5">
                                <span>⏰ Falta de tempo</span>
                            </label>
                            <label class="flex items-center gap-3 p-3 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                                <input type="radio" name="motivo" value="outro" class="w-5 h-5">
                                <span>✏️ Outro (especificar)</span>
                            </label>
                        </div>

                        <div id="outroMotivoContainer" style="display: none;">
                            <label class="block text-sm font-semibold text-gray-700 mb-2">📝 Detalhe o motivo:</label>
                            <textarea 
                                id="outroMotivoTexto" 
                                rows="3"
                                class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:border-cm-turquesa"
                                placeholder="Digite o motivo específico..."></textarea>
                        </div>

                        <div class="flex gap-3 mt-6">
                            <button onclick="app.confirmarNaoDeuTempo()" class="flex-1 btn-danger">
                                Confirmar e Avançar
                            </button>
                            <button onclick="app.fecharModalNaoDeuTempo()" class="flex-1 btn-secondary">
                                Cancelar
                            </button>
                        </div>
                    </div>
                `;

                // Listener para mostrar campo "outro"
                document.querySelectorAll('input[name="motivo"]').forEach(radio => {
                    radio.addEventListener('change', (e) => {
                        const container = document.getElementById('outroMotivoContainer');
                        if (e.target.value === 'outro') {
                            container.style.display = 'block';
                        } else {
                            container.style.display = 'none';
                        }
                    });
                });
            }

            async confirmarNaoDeuTempo() {
                const motivoSelecionado = document.querySelector('input[name="motivo"]:checked');
                
                if (!motivoSelecionado) {
                    alert('❌ Selecione um motivo!');
                    return;
                }

                let motivo = motivoSelecionado.value;
                
                if (motivo === 'outro') {
                    const outroTexto = document.getElementById('outroMotivoTexto').value.trim();
                    if (!outroTexto) {
                        alert('❌ Digite o motivo específico!');
                        return;
                    }
                    motivo = outroTexto;
                }

                const tarefa = this.tarefas[this.tarefaAtualIndex];
                tarefa.status = 'nao_deu_tempo';
                tarefa.motivo_nao_concluida = motivo;
                tarefa.horario_conclusao = new Date().toISOString();
                
                this.metricas.nao_deu_tempo++;
                
                this.fecharModalNaoDeuTempo();
                await this.salvarProgresso();
                await this.proximaTarefa();
            }

            refazerTarefa() {
                const tarefa = this.tarefas[this.tarefaAtualIndex];
                
                if (tarefa.status === 'nao_deu_tempo') {
                    // Resetar tarefa
                    tarefa.status = 'pendente';
                    tarefa.motivo_nao_concluida = null;
                    tarefa.horario_conclusao = null;
                    
                    // Decrementar métrica
                    this.metricas.nao_deu_tempo--;
                    
                    // Re-renderizar
                    this.renderTarefaAtual();
                }
            }

            async irParaTarefa(index) {
                // Permitir navegar para qualquer tarefa
                this.tarefaAtualIndex = index;
                await this.salvarProgresso();
                this.renderTarefaAtual();
            }

            async proximaTarefa() {
                if (this.tarefaAtualIndex < this.tarefas.length - 1) {
                    this.tarefaAtualIndex++;
                    await this.salvarProgresso();
                    this.renderTarefaAtual();
                } else {
                    await this.finalizarRotina();
                }
            }

            async tarefaAnterior() {
                if (this.tarefaAtualIndex > 0) {
                    this.tarefaAtualIndex--;
                    await this.salvarProgresso();
                    this.renderTarefaAtual();
                }
            }

            async salvarProgresso() {
                const hoje = new Date().toISOString().split('T')[0];
                
                await supabase
                    .from('progresso_diario')
                    .upsert({
                        user_id: this.currentUser.id,
                        data: hoje,
                        periodo: this.periodo,
                        tarefa_atual_index: this.tarefaAtualIndex,
                        progresso: { tarefas: this.tarefas },
                        metricas: this.metricas,
                        status: 'em_andamento'
                    }, {
                        onConflict: 'user_id,data,periodo'
                    });
            }

            async finalizarRotina() {
                const hoje = new Date().toISOString().split('T')[0];
                
                await supabase
                    .from('progresso_diario')
                    .update({
                        status: 'finalizado',
                        finalizado_em: new Date().toISOString(),
                        metricas: this.metricas
                    })
                    .eq('user_id', this.currentUser.id)
                    .eq('data', hoje)
                    .eq('periodo', this.periodo);

                this.renderResumo();
            }

            abrirModalPausa() {
                document.getElementById('modalPausa').classList.add('active');
            }

            fecharModalPausa() {
                document.getElementById('modalPausa').classList.remove('active');
            }

            async confirmarPausa() {
                const hoje = new Date().toISOString().split('T')[0];
                
                await supabase
                    .from('progresso_diario')
                    .update({ status: 'pausado' })
                    .eq('user_id', this.currentUser.id)
                    .eq('data', hoje)
                    .eq('periodo', this.periodo);

                this.fecharModalPausa();
                this.renderDashboard();
            }

            iniciarAutoSave() {
                if (this.autoSaveInterval) {
                    clearInterval(this.autoSaveInterval);
                }
                this.autoSaveInterval = setInterval(() => {
                    if (this.periodo && this.tarefas.length > 0) {
                        this.salvarProgresso();
                    }
                }, 30000); // Auto-save a cada 30 segundos
            }

            async logout() {
                if (this.autoSaveInterval) {
                    clearInterval(this.autoSaveInterval);
                }
                await supabase.auth.signOut();
                this.currentUser = null;
                this.renderLogin();
            }

            calcularProgresso() {
                const total = this.tarefas.length;
                const realizadas = this.tarefas.filter(t => 
                    t.status === 'concluida' || t.status === 'nao_deu_tempo'
                ).length;
                return Math.round((realizadas / total) * 100);
            }

            renderSidebarRegras() {
                return `
                    <div class="sidebar-regras">
                        <h3 class="text-lg font-bold text-cm-escuro mb-4">⚠️ REGRAS DO DIA</h3>
                        <div class="space-y-3">
                            ${this.regras.filter(r => r.tipo === 'regra').map(regra => `
                                <div class="regra-item bg-gray-50 p-3 rounded-lg">
                                    <p class="text-sm font-semibold text-gray-800">
                                        ${regra.icone} ${regra.texto}
                                    </p>
                                </div>
                            `).join('')}
                        </div>

                        <h3 class="text-lg font-bold text-cm-escuro mt-6 mb-4">💡 LEMBRETES</h3>
                        <div class="space-y-3">
                            ${this.regras.filter(r => r.tipo === 'lembrete').map(lembrete => `
                                <div class="bg-yellow-50 border-l-4 border-yellow-400 p-3 rounded">
                                    <p class="text-sm text-gray-700">
                                        ${lembrete.icone} ${lembrete.texto}
                                    </p>
                                </div>
                            `).join('')}
                        </div>

                        <h3 class="text-lg font-bold text-cm-escuro mt-6 mb-4">📲 PLATAFORMAS</h3>
                        <div class="space-y-2">
                            <div class="flex justify-between items-center p-2 rounded ${this.statusPlataformas.whatsapp_ok ? 'bg-green-50' : 'bg-red-50'}">
                                <span class="text-sm font-semibold">WhatsApp</span>
                                <span>${this.statusPlataformas.whatsapp_ok ? '✅' : '❌'}</span>
                            </div>
                            <div class="flex justify-between items-center p-2 rounded ${this.statusPlataformas.ll_ok ? 'bg-green-50' : 'bg-red-50'}">
                                <span class="text-sm font-semibold">LL (CRM)</span>
                                <span>${this.statusPlataformas.ll_ok ? '✅' : '❌'}</span>
                            </div>
                            <div class="flex justify-between items-center p-2 rounded bg-green-50">
                                <span class="text-sm font-semibold">Rotina</span>
                                <span>✅</span>
                            </div>
                        </div>
                    </div>
                `;
            }

            renderLogin() {
                const app = document.getElementById('app');
                app.innerHTML = `
                    <div class="min-h-screen bg-cm-escuro flex items-center justify-center p-4">
                        <div class="bg-white rounded-lg shadow-2xl p-8 w-full max-w-md">
                            <div class="flex justify-center mb-8">
                                <div class="flex gap-2">
                                    <div class="w-16 h-20 bg-cm-laranja rounded flex items-center justify-center">
                                        <span class="text-cm-escuro text-4xl font-bold">C</span>
                                    </div>
                                    <div class="w-16 h-20 bg-cm-verde rounded flex items-center justify-center">
                                        <span class="text-cm-escuro text-4xl font-bold">&</span>
                                    </div>
                                    <div class="w-16 h-20 bg-cm-turquesa rounded flex items-center justify-center">
                                        <span class="text-cm-escuro text-4xl font-bold">M</span>
                                    </div>
                                </div>
                            </div>
                            <h1 class="text-2xl font-bold text-center text-cm-escuro mb-2">Rotina do Consultor v3.0</h1>
                            <p class="text-gray-600 text-center mb-6 text-sm">🎯 Uma tarefa por vez | ⏱️ Timer 5min | 📊 Métricas</p>
                            
                            <div>
                                <input type="email" id="loginEmail" placeholder="Email" class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:border-cm-turquesa" />
                                <input type="password" id="loginSenha" placeholder="Senha" class="w-full px-4 py-3 border border-gray-300 rounded-lg mb-4 focus:outline-none focus:border-cm-turquesa" />
                                <button onclick="app.fazerLogin()" class="w-full btn-primary">Entrar</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            async fazerLogin() {
                const email = document.getElementById('loginEmail').value;
                const senha = document.getElementById('loginSenha').value;
                
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: senha
                });

                if (error) {
                    alert('❌ Erro ao fazer login: ' + error.message);
                    return;
                }

                this.currentUser = data.user;
                await this.carregarDados();
                this.iniciarAutoSave();
                this.renderDashboard();
            }

            renderDashboard() {
                const app = document.getElementById('app');
                const nomeUsuario = this.currentUser.user_metadata?.nome || this.currentUser.email.split('@')[0];
                const horaAtual = new Date().getHours();
                const periodo = horaAtual < 13 ? 'manha' : 'tarde';
                const periodoTexto = periodo === 'manha' ? '🌅 Manhã' : '🌆 Tarde';

                app.innerHTML = `

            async carregarTarefasProblemaIndividual() {

                                    <p class="text-sm text-gray-600 mb-1">Média da Equipe</p>

            async verDetalhesConsultor(userId) {

                    .eq('user_id', userId)

                    .order('data', { ascending: false });

                const { data: tarefasProblema } = await supabase.rpc('get_top_tarefas_problema', {
                    p_user_id: userId,
                    p_limite: 5
                });

                const consultor = this.rankingConsultores.find(c => c.user_id === userId);
                if (!consultor) return;

                const app = document.getElementById('app');

                app.innerHTML = `
                    <div class="min-h-screen bg-gray-50">
                        <div class="bg-cm-escuro text-white shadow-lg">
                            <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
                                <div>
                                    <h1 class="text-xl font-bold">👤 ${consultor.consultor_nome}</h1>
                                    <p class="text-xs text-gray-300">${consultor.consultor_email}</p>
                                </div>
                                <div class="flex gap-2">

                                </div>
                            </div>
                        </div>

                        <div class="max-w-6xl mx-auto px-4 py-8">
                            
                            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                                <div class="bg-white rounded-lg shadow-lg p-6 border-t-4 border-cm-turquesa">
                                    <p class="text-sm text-gray-600 mb-1">Média 7 Dias</p>
                                    <p class="text-4xl font-bold text-cm-turquesa">${consultor.media_conclusao}%</p>
                                    <p class="text-xs text-gray-500 mt-2">${consultor.total_periodos} períodos</p>
                                </div>
                                <div class="bg-white rounded-lg shadow-lg p-6 border-t-4 border-green-500">
                                    <p class="text-sm text-gray-600 mb-1">Concluídas</p>
                                    <p class="text-4xl font-bold text-green-600">${consultor.total_concluidas}</p>
                                    <p class="text-xs text-gray-500 mt-2">Últimos 7 dias</p>
                                </div>
                                <div class="bg-white rounded-lg shadow-lg p-6 border-t-4 border-orange-500">
                                    <p class="text-sm text-gray-600 mb-1">Não Deu Tempo</p>
                                    <p class="text-4xl font-bold text-orange-600">${consultor.total_nao_deu_tempo}</p>
                                    <p class="text-xs text-gray-500 mt-2">Últimos 7 dias</p>
                                </div>
                                <div class="bg-white rounded-lg shadow-lg p-6 border-t-4 border-blue-500">
                                    <p class="text-sm text-gray-600 mb-1">Leads Atendidos</p>
                                    <p class="text-4xl font-bold text-blue-600">${consultor.total_leads}</p>
                                    <p class="text-xs text-gray-500 mt-2">Últimos 7 dias</p>
                                </div>
                            </div>

                            <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
                                <h3 class="text-lg font-bold text-gray-800 mb-4">📅 Histórico Detalhado</h3>
                                <div class="overflow-x-auto">
                                    <table class="w-full">
                                        <thead class="bg-gray-100">
                                            <tr>
                                                <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">Data</th>
                                                <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">Período</th>
                                                <th class="px-4 py-3 text-right text-sm font-semibold text-gray-700">Conclusão</th>
                                                <th class="px-4 py-3 text-right text-sm font-semibold text-gray-700">Concluídas</th>
                                                <th class="px-4 py-3 text-right text-sm font-semibold text-gray-700">Não Deram Tempo</th>
                                                <th class="px-4 py-3 text-right text-sm font-semibold text-gray-700">Leads</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-gray-200">
                                            ${metricas.map(m => `
                                                <tr class="hover:bg-gray-50">
                                                    <td class="px-4 py-3 text-sm">${new Date(m.data).toLocaleDateString('pt-BR')}</td>
                                                    <td class="px-4 py-3 text-sm">${m.periodo === 'manha' ? '🌅 Manhã' : '🌆 Tarde'}</td>

                                ${tarefasProblema && tarefasProblema.length > 0 ? `

            // ===== MÉTODOS BOTÃO SECRETO ADMIN =====

            abrirModalAdmin() {
                const modal = document.createElement('div');
                modal.id = 'modalAdmin';
                modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
                modal.innerHTML = `
                    <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4 shadow-2xl">
                        <h2 class="text-2xl font-bold text-purple-600 mb-2">👑 Ativar Modo Admin</h2>
                        <p class="text-gray-600 mb-6 text-sm">Digite a senha secreta para se tornar administrador:</p>
                        
                        <input 
                            type="password" 
                            id="senhaAdmin" 
                            placeholder="Senha secreta"
                            class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg mb-6 focus:outline-none focus:border-purple-500 text-lg font-mono text-center"
                            maxlength="20"
                        />
                        
                        <div class="flex gap-3">
                            <button onclick="app.fecharModalAdmin()" class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-700 font-bold py-3 px-6 rounded-lg transition">
                                ❌ Cancelar
                            </button>
                            <button onclick="app.confirmarAdmin()" class="flex-1 bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg transition">
                                ✅ Confirmar
                            </button>
                        </div>
                        
                        <p class="text-xs text-gray-400 text-center mt-4">
                            💡 Você precisa estar logado para ativar o modo admin
                        </p>
                    </div>
                `;
                document.body.appendChild(modal);
                
                // Focar no input
                setTimeout(() => {
                    const input = document.getElementById('senhaAdmin');
                    if (input) input.focus();
                }, 100);
                
                // Permitir Enter para confirmar
                const senhaInput = document.getElementById('senhaAdmin');
                if (senhaInput) {
                    senhaInput.addEventListener('keypress', (e) => {
                        if (e.key === 'Enter') this.confirmarAdmin();
                    });
                }
            }

            fecharModalAdmin() {
                const modal = document.getElementById('modalAdmin');
                if (modal) modal.remove();
            }

            async confirmarAdmin() {
                const senhaInput = document.getElementById('senhaAdmin');
                if (!senhaInput) return;
                
                const senhaDigitada = senhaInput.value.trim();
                const SENHA_ADMIN = '071727'; // 👈 MUDE ESTA SENHA AQUI SE QUISER!
                
                if (senhaDigitada !== SENHA_ADMIN) {
                    alert('❌ Senha incorreta!\n\nTente novamente.');
                    senhaInput.value = '';
                    senhaInput.focus();
                    return;
                }
                
                if (!this.currentUser) {
                    alert('⚠️ Você precisa fazer LOGIN primeiro!');
                    this.fecharModalAdmin();
                    return;
                }
                
                try {
                    // Inserir ou atualizar role de admin
                    const { error } = await supabase
                        .from('user_roles')
                        .upsert({ 
                            user_id: this.currentUser.id, 
                            is_admin: true 
                        }, {
                            onConflict: 'user_id'
                        });
                    
                    if (error) throw error;
                    
                    // Atualizar flag local
                    this.isAdmin = true;
                    
                    // Fechar modal
                    this.fecharModalAdmin();
                    
                    // Mostrar mensagem de sucesso
                    alert('🎉 PARABÉNS!\n\nVocê agora é ADMINISTRADOR! 👑\n\nO menu "👥 Equipe" vai aparecer agora!\n\n✅ Privilégios de admin ativados!');
                    
                    // Recarregar dados e dashboard
                    await this.carregarDados();
                    this.renderDashboard();
                    
                } catch (error) {
                    console.error('❌ Erro ao tornar admin:', error);
                    alert('❌ ERRO ao ativar modo admin!\n\nDetalhes: ' + error.message + '\n\nAbra o console (F12) para mais informações.');
                }
            }
        }

        const app = new RotinaSequencial();
    </script>
</body>
