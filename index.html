<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C&M - Rotina Sequencial v3.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --cor-laranja: #F5A623;
            --cor-verde: #C8D946;
            --cor-turquesa: #4ECDC4;
            --cor-escuro: #2C5F5D;
        }
        .bg-cm-escuro { background-color: var(--cor-escuro); }
        .bg-cm-laranja { background-color: var(--cor-laranja); }
        .bg-cm-verde { background-color: var(--cor-verde); }
        .bg-cm-turquesa { background-color: var(--cor-turquesa); }
        .text-cm-escuro { color: var(--cor-escuro); }
        .text-cm-laranja { color: var(--cor-laranja); }
        .text-cm-turquesa { color: var(--cor-turquesa); }

        .slide-in { animation: slideIn 0.3s ease-out; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .pulse-animation { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .timer-circle {
            width: 80px; height: 80px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; font-weight: bold; color: white;
            transition: background-color 0.5s;
        }
        .timer-ok { background-color: #10B981; }
        .timer-warning { background-color: #F59E0B; }
        .timer-danger { background-color: #EF4444; animation: blink 0.8s infinite; }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }
        .modal {
            display: none; position: fixed; z-index: 50;
            left: 0; top: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5); overflow-y: auto;
        }
        .modal.active {
            display: flex; align-items: center;
            justify-content: center; padding: 20px;
        }
        .modal-content {
            background: white; border-radius: 12px;
            max-width: 500px; width: 100%;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        .progress-bar { transition: width 0.5s ease; }
        .tarefa-card { min-height: 420px; }
        .regra-item { border-left: 4px solid var(--cor-turquesa); }
        .sidebar-regras {
            position: fixed; right: 0; top: 0; height: 100vh;
            width: 300px; background: white;
            box-shadow: -4px 0 6px rgba(0,0,0,0.1);
            padding: 20px; overflow-y: auto; z-index: 40;
        }
        @media (max-width: 768px) { .sidebar-regras { display: none; } }
        .btn-primary {
            background: linear-gradient(135deg, var(--cor-laranja), var(--cor-turquesa));
            color: white; font-weight: bold; padding: 12px 24px;
            border-radius: 8px; transition: opacity 0.2s; cursor: pointer;
        }
        .btn-primary:hover { opacity: 0.9; }
        .btn-secondary {
            background: #6B7280; color: white; font-weight: bold;
            padding: 12px 24px; border-radius: 8px;
            transition: background 0.2s; cursor: pointer;
        }
        .btn-secondary:hover { background: #4B5563; }
        .btn-danger {
            background: #EF4444; color: white; font-weight: bold;
            padding: 12px 24px; border-radius: 8px;
            transition: background 0.2s; cursor: pointer;
        }
        .btn-danger:hover { background: #DC2626; }
        .badge-prioritaria {
            background: #FEE2E2; color: #DC2626;
            padding: 2px 10px; border-radius: 999px;
            font-size: 0.75rem; font-weight: bold;
        }
        .badge-verificacao {
            background: #D1FAE5; color: #065F46;
            padding: 2px 10px; border-radius: 999px;
            font-size: 0.75rem; font-weight: bold;
        }
        .badge-padrao {
            background: #DBEAFE; color: #1E40AF;
            padding: 2px 10px; border-radius: 999px;
            font-size: 0.75rem; font-weight: bold;
        }
        .aviso-dia-especial {
            background: linear-gradient(135deg, #FEF3C7, #FDE68A);
            border-left: 4px solid #F59E0B; border-radius: 8px;
            padding: 16px; margin-bottom: 16px;
        }
        .contador-rapido {
            display: flex; align-items: center; gap: 12px;
            background: #F3F4F6; border-radius: 12px; padding: 16px;
        }
        .contador-btn {
            width: 44px; height: 44px; border-radius: 50%;
            font-size: 1.5rem; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: transform 0.1s; border: none;
        }
        .contador-btn:active { transform: scale(0.9); }
        .contador-valor {
            font-size: 2.5rem; font-weight: bold;
            min-width: 60px; text-align: center; color: var(--cor-escuro);
        }

        /* Tabs do login */
        .tab-btn { transition: all 0.2s; }
        .tab-btn.active {
            background: var(--cor-escuro); color: white;
        }
    </style>
</head>
<body class="bg-gray-50">

    <!-- Modal Não Deu Tempo -->
    <div id="modalNaoDeuTempo" class="modal">
        <div class="modal-content">
            <div class="bg-cm-escuro text-white p-6 rounded-t-xl">
                <h2 class="text-xl font-bold">❌ Por que não deu tempo?</h2>
            </div>
            <div class="p-6">
                <div id="conteudoModalNaoDeuTempo"></div>
            </div>
        </div>
    </div>

    <!-- Modal Pausa -->
    <div id="modalPausa" class="modal">
        <div class="modal-content">
            <div class="bg-cm-escuro text-white p-6 rounded-t-xl">
                <h2 class="text-xl font-bold">⏸️ Pausar Rotina</h2>
            </div>
            <div class="p-6">
                <p class="text-gray-700 mb-4">Deseja pausar a rotina? Você pode continuar de onde parou.</p>
                <div class="flex gap-3">
                    <button onclick="app.confirmarPausa()" class="flex-1 btn-danger">Pausar</button>
                    <button onclick="app.fecharModalPausa()" class="flex-1 btn-secondary">Cancelar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app"></div>

    <script>
        const SUPABASE_URL = 'https://awppfluuudipkgrtrgyw.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3cHBmbHV1dWRpcGtncnRyZ3l3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njk4MTk5MDYsImV4cCI6MjA4NTM5NTkwNn0.L7EjW4ytXMbVlGxhsMb8Hh77cjRpPr5Y-KG0dR4e35A';
        const EDGE_FUNCTION_URL = 'https://awppfluuudipkgrtrgyw.supabase.co/functions/v1/smart-endpoint';

        if (!window.__cmSupabaseClient) {
            window.__cmSupabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        }
        var supabase = window.__cmSupabaseClient;

        // =============================================
        // UTILITÁRIOS DE DATA
        // =============================================
        function getDiaSemanaAtual() {
            const dias = ['domingo','segunda','terca','quarta','quinta','sexta','sabado'];
            return dias[new Date().getDay()];
        }
        function isDiaEspecial() {
            const dia = getDiaSemanaAtual();
            return dia === 'segunda' || dia === 'quarta';
        }
        function getNomeDia() {
            const nomes = {
                'domingo':'Domingo','segunda':'Segunda-feira','terca':'Terça-feira',
                'quarta':'Quarta-feira','quinta':'Quinta-feira','sexta':'Sexta-feira','sabado':'Sábado'
            };
            return nomes[getDiaSemanaAtual()];
        }
        function filtrarTarefasPorDia(tarefas) {
            const diaAtual = getDiaSemanaAtual();
            return tarefas.filter(t => {
                if (!t.dias_ocultar || t.dias_ocultar.length === 0) return true;
                return !t.dias_ocultar.includes(diaAtual);
            });
        }

        // =============================================
        // CLASSE PRINCIPAL
        // =============================================
        class RotinaSequencial {
            constructor() {
                this.currentUser = null;
                this.isAdmin = false;
                this.periodo = null;
                this.tarefas = [];
                this.tarefaAtualIndex = 0;
                this.regras = [];
                this.metricas = { total_tarefas:0, concluidas:0, nao_deu_tempo:0, leads_atendidos:0 };
                this.timerInterval = null;
                this.timerSegundos = 0;
                this.timerAtivo = false;
                this.autoSaveInterval = null;
                this.metricasHistorico = [];
                this.rankingConsultores = [];
                this.statusPlataformas = { whatsapp_ok:false, ll_ok:false, rotina_ok:true };
                this.verificarSessao();
            }

            // =============================================
            // SESSÃO E AUTENTICAÇÃO
            // =============================================
            async verificarSessao() {
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    this.currentUser = session.user;
                    await this.verificarAdmin();
                    await this.carregarDados();
                    this.iniciarAutoSave();
                    this.renderDashboard();
                } else {
                    this.renderLogin();
                }
            }

            async verificarAdmin() {
                const { data } = await supabase
                    .from('user_roles').select('is_admin')
                    .eq('user_id', this.currentUser.id).single();
                this.isAdmin = data?.is_admin || false;
            }

            async fazerLogin() {
                const email = document.getElementById('loginEmail').value.trim();
                const senha = document.getElementById('loginSenha').value;
                const btn = document.getElementById('btnLogin');
                if (!email || !senha) { alert('❌ Preencha email e senha!'); return; }
                btn.textContent = 'Entrando...';
                btn.disabled = true;

                const { data, error } = await supabase.auth.signInWithPassword({ email, password: senha });
                if (error) {
                    alert('❌ Erro ao fazer login: ' + error.message);
                    btn.textContent = 'Entrar';
                    btn.disabled = false;
                    return;
                }
                this.currentUser = data.user;
                await this.verificarAdmin();
                await this.carregarDados();
                this.iniciarAutoSave();
                this.renderDashboard();
            }

            async fazerCadastro() {
                const nome = document.getElementById('cadNome').value.trim();
                const email = document.getElementById('cadEmail').value.trim();
                const senha = document.getElementById('cadSenha').value;
                const confirmar = document.getElementById('cadConfirmar').value;
                const btn = document.getElementById('btnCadastro');
                const msgEl = document.getElementById('cadMensagem');

                if (!nome || !email || !senha || !confirmar) {
                    msgEl.innerHTML = '<p class="text-red-600 text-sm">❌ Preencha todos os campos!</p>';
                    return;
                }
                if (senha.length < 6) {
                    msgEl.innerHTML = '<p class="text-red-600 text-sm">❌ A senha precisa ter pelo menos 6 caracteres!</p>';
                    return;
                }
                if (senha !== confirmar) {
                    msgEl.innerHTML = '<p class="text-red-600 text-sm">❌ As senhas não coincidem!</p>';
                    return;
                }

                btn.textContent = 'Cadastrando...';
                btn.disabled = true;
                msgEl.innerHTML = '';

                const { data, error } = await supabase.auth.signUp({ email, password: senha });
                if (error) {
                    msgEl.innerHTML = `<p class="text-red-600 text-sm">❌ ${error.message}</p>`;
                    btn.textContent = 'Criar Conta';
                    btn.disabled = false;
                    return;
                }

                if (data.user) {
                    await supabase.from('user_profiles').upsert({
                        user_id: data.user.id,
                        nome: nome,
                        email: email
                    }, { onConflict: 'user_id' });
                }

                msgEl.innerHTML = '<p class="text-green-600 text-sm font-semibold">✅ Conta criada! Verifique seu email e depois faça login.</p>';
                btn.textContent = 'Criar Conta';
                btn.disabled = false;

                setTimeout(() => this.mostrarAba('login'), 3000);
            }

            mostrarAba(aba) {
                document.getElementById('abaLogin').classList.toggle('hidden', aba !== 'login');
                document.getElementById('abaCadastro').classList.toggle('hidden', aba !== 'cadastro');
                document.getElementById('tabLogin').classList.toggle('active', aba === 'login');
                document.getElementById('tabCadastro').classList.toggle('active', aba === 'cadastro');
            }

            async logout() {
                if (this.autoSaveInterval) clearInterval(this.autoSaveInterval);
                this.pararTimer();
                await supabase.auth.signOut();
                this.currentUser = null;
                this.renderLogin();
            }

            // =============================================
            // CARREGAR DADOS
            // =============================================
            async carregarDados() {
                const { data: regras } = await supabase
                    .from('regras_lembretes').select('*')
                    .eq('sempre_visivel', true).order('ordem');
                this.regras = regras || [];

                const hoje = new Date().toISOString().split('T')[0];
                const { data: status } = await supabase
                    .from('status_plataformas').select('*')
                    .eq('user_id', this.currentUser.id).eq('data', hoje).single();
                if (status) this.statusPlataformas = status;

                await this.carregarMetricasHistorico();
                if (this.isAdmin) await this.carregarRankingConsultores();
            }

            async carregarMetricasHistorico() {
                const { data, error } = await supabase
                    .from('vw_metricas_diarias').select('*')
                    .eq('user_id', this.currentUser.id)
                    .gte('data', new Date(Date.now() - 7*24*60*60*1000).toISOString().split('T')[0])
                    .order('data', { ascending: false });
                if (!error && data) this.metricasHistorico = data;
            }

            async carregarRankingConsultores() {
                const { data, error } = await supabase.from('vw_ranking_consultores').select('*');
                if (!error && data) this.rankingConsultores = data;
            }

            iniciarAutoSave() {
                if (this.autoSaveInterval) clearInterval(this.autoSaveInterval);
                this.autoSaveInterval = setInterval(() => {
                    if (this.periodo && this.tarefas.length > 0) this.salvarProgresso();
                }, 30000);
            }

            // =============================================
            // TIMER
            // =============================================
            iniciarTimer() {
                this.pararTimer();
                this.timerSegundos = 300;
                this.timerAtivo = true;
                this.atualizarDisplayTimer();
                this.timerInterval = setInterval(() => {
                    this.timerSegundos--;
                    this.atualizarDisplayTimer();
                    if (this.timerSegundos <= 0) { this.pararTimer(); this.alertaTimer(); }
                }, 1000);
            }

            pararTimer() {
                if (this.timerInterval) { clearInterval(this.timerInterval); this.timerInterval = null; }
                this.timerAtivo = false;
            }

            resetarTimer() {
                this.pararTimer();
                this.timerSegundos = 300;
                this.timerAtivo = true;
                this.atualizarDisplayTimer();
                this.timerInterval = setInterval(() => {
                    this.timerSegundos--;
                    this.atualizarDisplayTimer();
                    if (this.timerSegundos <= 0) { this.pararTimer(); this.alertaTimer(); }
                }, 1000);
            }

            atualizarDisplayTimer() {
                const el = document.getElementById('timerDisplay');
                if (!el) return;
                const min = Math.floor(this.timerSegundos / 60);
                const seg = this.timerSegundos % 60;
                el.textContent = `${String(min).padStart(2,'0')}:${String(seg).padStart(2,'0')}`;
                const circle = document.getElementById('timerCircle');
                if (!circle) return;
                circle.className = 'timer-circle';
                if (this.timerSegundos > 180) circle.classList.add('timer-ok');
                else if (this.timerSegundos > 60) circle.classList.add('timer-warning');
                else circle.classList.add('timer-danger');
            }

            alertaTimer() {
                const el = document.getElementById('timerDisplay');
                if (el) el.textContent = '00:00';
                const circle = document.getElementById('timerCircle');
                if (circle) { circle.className = 'timer-circle timer-danger'; circle.innerHTML = '⚠️'; }
                if (navigator.vibrate) navigator.vibrate([300,100,300]);
            }

            // =============================================
            // CONTADOR
            // =============================================
            incrementarContador() {
                const tarefa = this.tarefas[this.tarefaAtualIndex];
                tarefa.contador_valor = (tarefa.contador_valor || 0) + 1;
                const el = document.getElementById('contadorValorDisplay');
                if (el) el.textContent = tarefa.contador_valor;
                this.atualizarMetricasLeads();
            }

            decrementarContador() {
                const tarefa = this.tarefas[this.tarefaAtualIndex];
                if (tarefa.contador_valor > 0) {
                    tarefa.contador_valor--;
                    const el = document.getElementById('contadorValorDisplay');
                    if (el) el.textContent = tarefa.contador_valor;
                    this.atualizarMetricasLeads();
                }
            }

            atualizarMetricasLeads() {
                if (this.tarefas[this.tarefaAtualIndex].categoria === 'atendimento') {
                    this.metricas.leads_atendidos = this.tarefas
                        .filter(t => t.categoria === 'atendimento' && t.contador_valor)
                        .reduce((sum, t) => sum + (t.contador_valor || 0), 0);
                    const el = document.getElementById('metricaLeads');
                    if (el) el.textContent = this.metricas.leads_atendidos;
                }
            }

            // =============================================
            // ROTINA
            // =============================================
            async iniciarRotina(periodo) {
                this.periodo = periodo;
                const { data: templates } = await supabase
                    .from('rotina_templates').select('*')
                    .eq('periodo', periodo).order('ordem');

                if (!templates || templates.length === 0) {
                    alert('❌ Nenhuma tarefa encontrada para este período!'); return;
                }
                const tarefasFiltradas = filtrarTarefasPorDia(templates);
                const hoje = new Date().toISOString().split('T')[0];
                const { data: progressoSalvo } = await supabase
                    .from('progresso_diario').select('*')
                    .eq('user_id', this.currentUser.id).eq('data', hoje).eq('periodo', periodo).single();

                if (progressoSalvo && (progressoSalvo.status === 'em_andamento' || progressoSalvo.status === 'pausado')) {
                    const continuar = confirm('Você tem uma rotina em andamento! Deseja continuar de onde parou?');
                    if (continuar) {
                        this.tarefas = progressoSalvo.progresso.tarefas;
                        this.tarefaAtualIndex = progressoSalvo.tarefa_atual_index;
                        this.metricas = progressoSalvo.metricas;
                        this.renderTarefaAtual(); return;
                    }
                }

                this.tarefas = tarefasFiltradas.map((t, index) => ({
                    ...t, index, status:'pendente',
                    motivo_nao_concluida:null, horario_conclusao:null, contador_valor:0
                }));
                this.tarefaAtualIndex = 0;
                this.metricas = { total_tarefas:this.tarefas.length, concluidas:0, nao_deu_tempo:0, leads_atendidos:0 };

                await supabase.from('progresso_diario').upsert({
                    user_id: this.currentUser.id, data: hoje, periodo,
                    tarefa_atual_index: 0, progresso: { tarefas: this.tarefas },
                    metricas: this.metricas, status:'em_andamento', iniciado_em: new Date().toISOString()
                }, { onConflict:'user_id,data,periodo' });

                this.renderTarefaAtual();
            }

            async concluirTarefa() {
                const tarefa = this.tarefas[this.tarefaAtualIndex];
                tarefa.status = 'concluida';
                tarefa.horario_conclusao = new Date().toISOString();
                this.metricas.concluidas++;
                this.pararTimer();
                await this.salvarProgresso();
                await this.proximaTarefa();
            }

            async proximaTarefa() {
                if (this.tarefaAtualIndex < this.tarefas.length - 1) {
                    this.tarefaAtualIndex++;
                    await this.salvarProgresso();
                    this.renderTarefaAtual();
                } else {
                    await this.finalizarRotina();
                }
            }

            async tarefaAnterior() {
                if (this.tarefaAtualIndex > 0) {
                    this.tarefaAtualIndex--;
                    this.pararTimer();
                    await this.salvarProgresso();
                    this.renderTarefaAtual();
                }
            }

            async irParaTarefa(index) {
                this.tarefaAtualIndex = index;
                this.pararTimer();
                await this.salvarProgresso();
                this.renderTarefaAtual();
            }

            async salvarProgresso() {
                const hoje = new Date().toISOString().split('T')[0];
                await supabase.from('progresso_diario').upsert({
                    user_id: this.currentUser.id, data: hoje, periodo: this.periodo,
                    tarefa_atual_index: this.tarefaAtualIndex,
                    progresso: { tarefas: this.tarefas },
                    metricas: this.metricas, status:'em_andamento'
                }, { onConflict:'user_id,data,periodo' });
            }

            async finalizarRotina() {
                const hoje = new Date().toISOString().split('T')[0];
                this.pararTimer();
                await supabase.from('progresso_diario').update({
                    status:'finalizado', finalizado_em: new Date().toISOString(), metricas: this.metricas
                }).eq('user_id', this.currentUser.id).eq('data', hoje).eq('periodo', this.periodo);
                this.renderResumo();
            }

            abrirModalPausa() { document.getElementById('modalPausa').classList.add('active'); }
            fecharModalPausa() { document.getElementById('modalPausa').classList.remove('active'); }

            async confirmarPausa() {
                const hoje = new Date().toISOString().split('T')[0];
                this.pararTimer();
                await supabase.from('progresso_diario').update({ status:'pausado' })
                    .eq('user_id', this.currentUser.id).eq('data', hoje).eq('periodo', this.periodo);
                this.fecharModalPausa();
                this.renderDashboard();
            }

            abrirModalNaoDeuTempo() {
                this.renderModalNaoDeuTempo();
                document.getElementById('modalNaoDeuTempo').classList.add('active');
            }
            fecharModalNaoDeuTempo() { document.getElementById('modalNaoDeuTempo').classList.remove('active'); }

            renderModalNaoDeuTempo() {
                const conteudo = document.getElementById('conteudoModalNaoDeuTempo');
                conteudo.innerHTML = `
                    <div class="space-y-4">
                        <p class="text-gray-700 font-semibold">Selecione o motivo:</p>
                        <div class="space-y-2">
                            ${[
                                ['Muitos atendimentos','😰'],
                                ['Problema técnico','🔧'],
                                ['Reunião não prevista','📅'],
                                ['Falta de tempo','⏰']
                            ].map(([val, ico]) => `
                                <label class="flex items-center gap-3 p-3 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                                    <input type="radio" name="motivo" value="${val}" class="w-5 h-5">
                                    <span>${ico} ${val}</span>
                                </label>`).join('')}
                            <label class="flex items-center gap-3 p-3 border border-gray-300 rounded-lg cursor-pointer hover:bg-gray-50">
                                <input type="radio" name="motivo" value="outro" class="w-5 h-5">
                                <span>✏️ Outro (especificar)</span>
                            </label>
                        </div>
                        <div id="outroMotivoContainer" style="display:none;">
                            <label class="block text-sm font-semibold text-gray-700 mb-2">📝 Detalhe o motivo:</label>

                            <button onclick="app.fecharModalNaoDeuTempo()" class="flex-1 btn-secondary">Cancelar</button>
                        </div>
                    </div>`;
                document.querySelectorAll('input[name="motivo"]').forEach(r => {

                            e.target.value === 'outro' ? 'block' : 'none';

            async confirmarNaoDeuTempo() {
                const motivoSel = document.querySelector('input[name="motivo"]:checked');
                if (!motivoSel) { alert('❌ Selecione um motivo!'); return; }
                let motivo = motivoSel.value;
                if (motivo === 'outro') {
                    const txt = document.getElementById('outroMotivoTexto').value.trim();
                    if (!txt) { alert('❌ Digite o motivo específico!'); return; }
                    motivo = txt;
                }
                const tarefa = this.tarefas[this.tarefaAtualIndex];
                tarefa.status = 'nao_deu_tempo';
                tarefa.motivo_nao_concluida = motivo;
                tarefa.horario_conclusao = new Date().toISOString();
                this.metricas.nao_deu_tempo++;
                this.pararTimer();
                this.fecharModalNaoDeuTempo();
                await this.salvarProgresso();
                await this.proximaTarefa();
            }

            refazerTarefa() {
                const tarefa = this.tarefas[this.tarefaAtualIndex];
                if (tarefa.status === 'nao_deu_tempo') {
                    tarefa.status = 'pendente';
                    tarefa.motivo_nao_concluida = null;
                    tarefa.horario_conclusao = null;
                    this.metricas.nao_deu_tempo--;
                    this.renderTarefaAtual();
                }
            }

            calcularProgresso() {
                const total = this.tarefas.length;
                if (total === 0) return 0;
                const realizadas = this.tarefas.filter(t => t.status === 'concluida' || t.status === 'nao_deu_tempo').length;
                return Math.round((realizadas / total) * 100);
            }

            async executarAlterarSenha(userId) {
                const novaSenha = document.getElementById('novaSenhaInput').value;
                const confirmar = document.getElementById('confirmarSenhaInput').value;
                const msgEl = document.getElementById('msgAlterarSenha');
                const btn = document.getElementById('btnAlterarSenha');

                if (!novaSenha || !confirmar) {
                    msgEl.innerHTML = '<p class="text-red-600 text-sm">❌ Preencha os dois campos!</p>'; return;
                }
                if (novaSenha.length < 6) {
                    msgEl.innerHTML = '<p class="text-red-600 text-sm">❌ A senha precisa ter pelo menos 6 caracteres!</p>'; return;
                }
                if (novaSenha !== confirmar) {
                    msgEl.innerHTML = '<p class="text-red-600 text-sm">❌ As senhas não coincidem!</p>'; return;
                }

                btn.textContent = 'Salvando...';
                btn.disabled = true;
                msgEl.innerHTML = '';

                try {
                    const { data: { session } } = await supabase.auth.getSession();
                    const response = await fetch(EDGE_FUNCTION_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${session.access_token}`
                        },
                        body: JSON.stringify({ target_user_id: userId, nova_senha: novaSenha })
                    });
                    const result = await response.json();

                    if (!response.ok || result.error) {
                        msgEl.innerHTML = `<p class="text-red-600 text-sm">❌ ${result.error || 'Erro ao alterar senha'}</p>`;
                        btn.textContent = 'Salvar Senha';
                        btn.disabled = false;
                        return;
                    }

                    msgEl.innerHTML = '<p class="text-green-600 text-sm font-semibold">✅ Senha alterada com sucesso!</p>';
                    btn.textContent = 'Salvar Senha';
                    btn.disabled = false;
                    setTimeout(() => document.getElementById('modalAlterarSenha')?.remove(), 1500);
                } catch (err) {
                    msgEl.innerHTML = `<p class="text-red-600 text-sm">❌ Erro de conexão: ${err.message}</p>`;
                    btn.textContent = 'Salvar Senha';
                    btn.disabled = false;
                }
            }

                                    <p class="text-xs text-gray-500 mt-2">Últimos 7 dias</p>
                                </div>
                                <div class="bg-white rounded-lg shadow-lg p-6 border-t-4 border-green-500">
                                    <p class="text-sm text-gray-600 mb-1">Total Consultores</p>
                                    <p class="text-4xl font-bold text-green-600">${this.rankingConsultores.length}</p>
                                    <p class="text-xs text-gray-500 mt-2">Ativos</p>
                                </div>
                                <div class="bg-white rounded-lg shadow-lg p-6 border-t-4 border-blue-500">
                                    <p class="text-sm text-gray-600 mb-1">Top Performer</p>
                                    <p class="text-2xl font-bold text-blue-600">${this.rankingConsultores[0]?.consultor_nome || '-'}</p>
                                    <p class="text-xs text-gray-500 mt-2">${this.rankingConsultores[0]?.media_conclusao || 0}% média</p>
                                </div>
                            </div>
                            <div class="bg-white rounded-lg shadow-lg p-6">
                                <h3 class="text-lg font-bold text-gray-800 mb-4">🏆 Ranking de Consultores</h3>
                                <div class="space-y-3">
                                    ${this.rankingConsultores.map((c, index) => {
                                        const pos = index + 1;
                                        const medalha = pos === 1 ? '🥇' : pos === 2 ? '🥈' : pos === 3 ? '🥉' : `${pos}º`;
                                        const cor = c.media_conclusao >= 80 ? 'border-green-500' : c.media_conclusao >= 60 ? 'border-orange-500' : 'border-red-500';
                                        return `
                                            <div class="flex items-center gap-4 p-4 border-l-4 ${cor} bg-gray-50 rounded-lg hover:bg-gray-100 cursor-pointer transition"
                                                 onclick="app.verDetalhesConsultor('${c.user_id}')">
                                                <div class="w-10 text-center text-2xl">${medalha}</div>
                                                <div class="flex-1">
                                                    <p class="font-bold text-gray-800">${c.consultor_nome}</p>
                                                    <p class="text-xs text-gray-500">${c.consultor_email}</p>
                                                </div>
                                                <div class="text-right">
                                                    <p class="text-2xl font-bold ${c.media_conclusao >= 80 ? 'text-green-600' : c.media_conclusao >= 60 ? 'text-orange-600' : 'text-red-600'}">${c.media_conclusao}%</p>
                                                    <p class="text-xs text-gray-500">${c.total_leads} leads</p>
                                                </div>
                                            </div>`;
                                    }).join('')}
                                </div>
                            </div>
                        </div>
                    </div>`;
            }

            async verDetalhesConsultor(userId) {
                const { data: metricas } = await supabase
                    .from('vw_metricas_diarias').select('*').eq('user_id', userId)
                    .gte('data', new Date(Date.now() - 7*24*60*60*1000).toISOString().split('T')[0])
                    .order('data', { ascending: false });
                const { data: tarefasProblema } = await supabase.rpc('get_top_tarefas_problema', {
                    p_user_id: userId, p_limite: 5
                });
                const c = this.rankingConsultores.find(x => x.user_id === userId);
                if (!c) return;

                document.getElementById('app').innerHTML = `
                    <div class="min-h-screen bg-gray-50">
                        <div class="bg-cm-escuro text-white shadow-lg">
                            <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
                                <div>
                                    <h1 class="text-xl font-bold">👤 ${c.consultor_nome}</h1>
                                    <p class="text-xs text-gray-300">${c.consultor_email}</p>
                                </div>
                                <div class="flex gap-2">
                                    <button onclick="app.renderDashboardAdminGeral()" class="bg-gray-600 hover:bg-gray-700 px-4 py-2 rounded-lg text-sm">⬅️ Voltar</button>
                                    <button onclick="app.logout()" class="bg-red-500 hover:bg-red-600 px-4 py-2 rounded-lg text-sm">🚪 Sair</button>
                                </div>
                            </div>
                        </div>
                        <div class="max-w-6xl mx-auto px-4 py-8">
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                                <div class="bg-white rounded-lg shadow-lg p-6 border-t-4 border-cm-turquesa">
                                    <p class="text-sm text-gray-600">Média 7 Dias</p>
                                    <p class="text-4xl font-bold text-cm-turquesa">${c.media_conclusao}%</p>
                                </div>
                                <div class="bg-white rounded-lg shadow-lg p-6 border-t-4 border-green-500">
                                    <p class="text-sm text-gray-600">Concluídas</p>
                                    <p class="text-4xl font-bold text-green-600">${c.total_concluidas}</p>
                                </div>
                                <div class="bg-white rounded-lg shadow-lg p-6 border-t-4 border-orange-500">
                                    <p class="text-sm text-gray-600">Não Deu Tempo</p>
                                    <p class="text-4xl font-bold text-orange-600">${c.total_nao_deu_tempo}</p>
                                </div>
                                <div class="bg-white rounded-lg shadow-lg p-6 border-t-4 border-blue-500">
                                    <p class="text-sm text-gray-600">Leads Atendidos</p>
                                    <p class="text-4xl font-bold text-blue-600">${c.total_leads}</p>
                                </div>
                            </div>

                            <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
                                <h3 class="text-lg font-bold text-gray-800 mb-4">📅 Histórico Detalhado</h3>
                                <div class="overflow-x-auto">
                                    <table class="w-full">
                                        <thead class="bg-gray-100">
                                            <tr>
                                                <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">Data</th>
                                                <th class="px-4 py-3 text-left text-sm font-semibold text-gray-700">Período</th>
                                                <th class="px-4 py-3 text-right text-sm font-semibold text-gray-700">Conclusão</th>
                                                <th class="px-4 py-3 text-right text-sm font-semibold text-gray-700">Concluídas</th>
                                                <th class="px-4 py-3 text-right text-sm font-semibold text-gray-700">Não Deram</th>
                                                <th class="px-4 py-3 text-right text-sm font-semibold text-gray-700">Leads</th>
                                            </tr>
                                        </thead>
                                        <tbody class="divide-y divide-gray-200">
                                            ${(metricas || []).map(m => `
                                                <tr class="hover:bg-gray-50">
                                                    <td class="px-4 py-3 text-sm">${new Date(m.data).toLocaleDateString('pt-BR')}</td>
                                                    <td class="px-4 py-3 text-sm">${m.periodo === 'manha' ? '🌅 Manhã' : '🌆 Tarde'}</td>
                                                    <td class="px-4 py-3 text-sm text-right font-bold ${m.taxa_conclusao >= 80 ? 'text-green-600' : m.taxa_conclusao >= 60 ? 'text-orange-600' : 'text-red-600'}">${m.taxa_conclusao}%</td>
                                                    <td class="px-4 py-3 text-sm text-right">${m.concluidas}</td>
                                                    <td class="px-4 py-3 text-sm text-right">${m.nao_deu_tempo}</td>
                                                    <td class="px-4 py-3 text-sm text-right">${m.leads_atendidos}</td>
                                                </tr>`).join('')}
                                        </tbody>
                                    </table>
                                </div>
                            </div>

                            <div class="bg-white rounded-lg shadow-lg p-6">
                                <h3 class="text-lg font-bold text-gray-800 mb-4">⚠️ Tarefas com Dificuldade</h3>
                                ${tarefasProblema && tarefasProblema.length > 0 ? `
                                    <div class="space-y-3">
                                        ${tarefasProblema.map((t, i) => `
                                            <div class="flex items-start gap-4 p-4 border-l-4 border-orange-500 bg-orange-50 rounded-lg">
                                                <div class="w-8 h-8 bg-orange-500 text-white rounded-full flex items-center justify-center font-bold flex-shrink-0">${i + 1}</div>
                                                <div>
                                                    <p class="font-semibold text-gray-800">${t.tarefa}</p>
                                                    <p class="text-sm text-gray-600 mt-1"><strong>Motivo:</strong> ${t.motivo_comum || 'Não especificado'}</p>
                                                    <p class="text-xs text-orange-600 mt-1">${t.ocorrencias} vez(es) nos últimos 7 dias</p>
                                                </div>
                                            </div>`).join('')}
                                    </div>
                                ` : `
                                    <div class="text-center py-8">
                                        <div class="text-6xl mb-4">🎉</div>
                                        <p class="text-gray-600 font-semibold">Sem problemas recorrentes!</p>
                                    </div>`}
                            </div>
                        </div>
                    </div>`;
            }

            abrirModalAdmin() {
                const modal = document.createElement('div');
                modal.id = 'modalAdmin';
                modal.className = 'fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50';
                modal.innerHTML = `
                    <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4 shadow-2xl">
                        <h2 class="text-2xl font-bold text-purple-600 mb-2">👑 Ativar Modo Admin</h2>
                        <p class="text-gray-600 mb-6 text-sm">Digite a senha para ativar:</p>
                        <input type="password" id="senhaAdmin" placeholder="Senha secreta"
                            class="w-full px-4 py-3 border-2 border-gray-300 rounded-lg mb-6 focus:outline-none focus:border-purple-500 text-lg font-mono text-center" maxlength="20" />
                        <div class="flex gap-3">
                            <button onclick="app.fecharModalAdmin()" class="flex-1 btn-secondary">❌ Cancelar</button>
                            <button onclick="app.confirmarAdmin()" class="flex-1 bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-6 rounded-lg">✅ Confirmar</button>
                        </div>
                    </div>`;
                document.body.appendChild(modal);
                setTimeout(() => { const i = document.getElementById('senhaAdmin'); if(i) i.focus(); }, 100);
                document.getElementById('senhaAdmin')?.addEventListener('keypress', e => { if(e.key === 'Enter') this.confirmarAdmin(); });
            }

            fecharModalAdmin() { document.getElementById('modalAdmin')?.remove(); }

            async confirmarAdmin() {
                const input = document.getElementById('senhaAdmin');
                if (!input) return;
                if (input.value.trim() !== '071727') {
                    alert('❌ Senha incorreta!'); input.value = ''; input.focus(); return;
                }
                try {
                    await supabase.from('user_roles').upsert(
                        { user_id: this.currentUser.id, is_admin: true },
                        { onConflict: 'user_id' }
                    );
                    this.isAdmin = true;
                    this.fecharModalAdmin();
                    alert('🎉 Modo Admin ativado com sucesso!');
                    await this.carregarDados();
                    this.renderDashboard();
                } catch (err) {
                    alert('❌ Erro ao ativar admin: ' + err.message);
                }
            }
        }

        const app = new RotinaSequencial();
    </script>
</body>
</html>
